<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeNaebCalculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f7f7f9;
            color: #1d1d1f;
            overflow: hidden;
        }

        .calculator {
            background: #ffffff;
            padding: 32px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 340px;
            transition: filter 0.3s ease;
        }

        .calculator.blur {
            filter: blur(5px);
            pointer-events: none;
        }

        .display {
            width: 100%;
            height: 80px;
            border: none;
            outline: none;
            text-align: right;
            font-size: 2.5rem;
            font-weight: 300;
            color: #1d1d1f;
            background: transparent;
            padding-bottom: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid #f2f2f7;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        button {
            border: none;
            outline: none;
            background: #ffffff;
            height: 60px;
            width: 60px;
            border-radius: 50%;
            font-size: 1.25rem;
            font-weight: 400;
            color: #1d1d1f;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        button:hover {
            background: #f5f5f7;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        button.operator {
            color: #0071e3;
            font-weight: 500;
        }

        button.clear {
            color: #ff3b30;
        }

        button.equal {
            background: #0071e3;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.2);
        }

        button.equal:hover {
            background: #0077ed;
        }

       
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: #ffffff;
            padding: 32px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.06);
            width: 90%;
            max-width: 340px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal h3 {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .modal p {
            font-size: 0.9rem;
            color: #86868b;
            margin-bottom: 24px;
        }

        .pay-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .pay-btn {
            width: 100%;
            height: 54px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 400;
            background: #f5f5f7;
            box-shadow: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            transition: all 0.2s ease;
        }

        .pay-btn:hover {
            background: #e8e8ed;
            transform: translateY(-2px);
        }

        .pay-btn:active {
            transform: translateY(0);
        }

        .pay-btn .price {
            font-weight: 600;
            color: #0071e3;
        }
    </style>
</head>
<body>

    <div class="calculator" id="calc">
        <input type="text" class="display" id="screen" readonly value="0">
        <div class="buttons">
            <button class="clear" onclick="clearScreen()">C</button>
            <button class="operator" onclick="appendValue('/')">÷</button>
            <button class="operator" onclick="appendValue('*')">×</button>
            <button class="operator" onclick="deleteLast()">⌫</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('-')">−</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('+')">+</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="equal" style="grid-row: span 2; height: 134px; border-radius: 30px;" onclick="showPaymentModal()">=</button>

            <button style="grid-column: span 2; width: 134px; border-radius: 30px;" onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3>Доступ ограничен</h3>
            <p>Для отображения результата выберите тарифный план:</p>
            <div class="pay-options">
                <button class="pay-btn" onclick="processPayment('visa')">
                    <span>💳 Разовый запрос (Visa)</span>
                    <span class="price">15$</span>
                </button>
                <button class="pay-btn" onclick="processPayment('week')">
                    <span>🗓️ Недельная подписка</span>
                    <span class="price">60$</span>
                </button>
                <button class="pay-btn" onclick="processPayment('year')">
                    <span>🚀 Ежегодная подписка</span>
                    <span class="price">980$</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const screen = document.getElementById('screen');
        const calc = document.getElementById('calc');
        const modalOverlay = document.getElementById('modalOverlay');

        function appendValue(value) {
            if (screen.value === '0' && value !== '.') {
                screen.value = value;
            } else {
                screen.value += value;
            }
        }

        function clearScreen() {
            screen.value = '0';
        }

        function deleteLast() {
            if (screen.value.length > 1) {
                screen.value = screen.value.slice(0, -1);
            } else {
                screen.value = '0';
            }
        }

        function showPaymentModal() {
            if (screen.value === 'Ошибка' || screen.value === '0') return;
            calc.classList.add('blur');
            modalOverlay.classList.add('active');
        }

        function processPayment(plan) {
            calc.classList.remove('blur');
            modalOverlay.classList.remove('active');

            setTimeout(() => {
                try {
                    let result = Function('"use strict";return (' + screen.value + ')')();
                    screen.value = Number(result.toFixed(8));
                    
                   
                    console.log(`Транзакция по плану "${plan}" прошла успешно. Благодарим за оплату! NeNaebCorporation`);
                } catch (error) {
                    screen.value = 'Ошибка';
                    setTimeout(clearScreen, 1500);
                }
            }, 300);
        }
    </script>

</body>
</html>
